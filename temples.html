<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temple Album</title>
  <meta name="description" content="A responsive picture album showcasing temples from around the world, built with HTML, CSS, and JavaScript.">
  <meta name="author" content="Eduardo Baez">

  <link rel="stylesheet" href="styles/temples.css">
  <link rel="stylesheet" href="styles/temples-large.css" media="screen and (min-width: 768px)">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

  <script src="scripts/temples.js" defer></script>
</head>
<body>

  <header>
    <p class="site-title">Temple Album</p>
    <button id="menu-button" aria-label="Toggle navigation menu">&#9776;</button>
    <nav id="primary-nav">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Old</a></li>
        <li><a href="#">New</a></li>
        <li><a href="#">Large</a></li>
        <li><a href="#">Small</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h1>Home</h1>

    <figure>
      <img src="images/san-diego-temple.jpg" alt="San Diego California Temple image" loading="lazy" width="400" height="300">
      <figcaption>San Diego California</figcaption>
    </figure>

    <figure>
      <img src="images/salt-lake-temple.jpg" alt="Salt Lake Temple image" loading="lazy" width="400" height="300">
      <figcaption>Salt Lake City Utah</figcaption>
    </figure>

    <figure>
      <img src="images/asuncion-paraguay-temple.jpg" alt="Asunción Paraguay Temple image" loading="lazy" width="400" height="300">
      <figcaption>Asunción Paraguay</figcaption>
    </figure>

    <figure>
      <img src="images/london-england-temple.jpg" alt="London England Temple image" loading="lazy" width="400" height="300">
      <figcaption>London England</figcaption>
    </figure>

    <figure>
      <img src="images/tokyo-japan-temple.jpg" alt="Tokyo Japan Temple image" loading="lazy" width="400" height="300">
      <figcaption>Tokyo Japan</figcaption>
    </figure>

    <figure>
      <img src="images/calgary-alberta-temple.jpg" alt="Calgary Alberta Temple image" loading="lazy" width="400" height="300">
      <figcaption>Calgary Alberta Canada</figcaption>
    </figure>

    <figure>
      <img src="images/curitiba-brazil-temple.jpg" alt="Curitiba Brazil Temple image" loading="lazy" width="400" height="300">
      <figcaption>Curitiba Brazil</figcaption>
    </figure>

    <figure>
      <img src="images/seoul-korea-temple.jpg" alt="Seoul Korea Temple image" loading="lazy" width="400" height="300">
      <figcaption>Seoul Korea</figcaption>
    </figure>

    <figure>
      <img src="images/laie-hawaii-temple.jpg" alt="Laie Hawaii Temple image" loading="lazy" width="400" height="300">
      <figcaption>Laie Hawaii</figcaption>
    </figure>

  </main>

  <footer>
    <p>&copy; <span id="year"></span> Eduardo Baez</p>
    <p><span id="last-modified"></span></p>
  </footer>

</body>
</html>
